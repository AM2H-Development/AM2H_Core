name: PlatformIO Build

on:
  push:
    branches: [ main, master, develop, "2.0.0-alpha" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main, master, "2.0.0-alpha" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release erstellen'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '#define VERSION' src/AM2H_Core.h | sed 's/.*"\(.*\)"/\1/' | tr -d '/"<>|*?\r\n\\')
          echo "version=${VERSION:-unknown}" >> $GITHUB_OUTPUT

      - name: Build
        run: platformio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp01-v${{ steps.version.outputs.version }}
          path: .pio/build/esp01/firmware.bin
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AM2H_Core v${{ steps.version.outputs.version }}
          files: .pio/build/esp01/firmware.bin
          body: |
            ## Firmware v${{ steps.version.outputs.version }}

            ### Erstmaliges Flashen (manuell, einmalig pro Device)
            > **Hinweis:** Ab v2.0.0 wird ein anderes Flash-Layout verwendet (512K OTA-Partition).
            > Bestehende Devices mit v1.x müssen **einmalig manuell** geflasht werden,
            > danach funktionieren OTA-Updates automatisch.

            1. ESP-01 in den Flash-Modus versetzen (GPIO0 auf GND beim Reset)
            2. USB-Serial Adapter anschließen
            3. [esp.huhn.me](https://esp.huhn.me) im Chrome/Edge öffnen
            4. `firmware.bin` bei Adresse `0x0` hochladen → **Flash**

            ### OTA-Update (nach einmaligem manuellem Flash)
            ```
            mosquitto_pub -t "<ns>/<device>/config/ota" -m "http://<server>:8080/firmware.bin"
            ```
